<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carpincho.mx | Carrito</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined"
      rel="stylesheet"
    />
    <style>
      .carrito-header {
        display: flex;
        align-items: center;
        gap: 15px;
        padding: 20px;
        position: sticky;
        top: 0;
        background: var(--bg-dark);
        z-index: 10;
        border-bottom: 1px solid #1a1a1a;
      }

      .carrito-header a {
        color: white;
        text-decoration: none;
      }

      .carrito-header h2 {
        margin: 0;
        font-size: 1.4rem;
        font-weight: 700;
      }

      /* === CARRITO VACÍO === */
      .carrito-vacio {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 70vh;
        gap: 14px;
        padding: 20px;
        text-align: center;
      }

      .icono-circulo {
        width: 90px;
        height: 90px;
        background: #1e1e1e;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 6px;
      }

      .icono-circulo .material-icons-outlined {
        font-size: 2.4rem;
        color: #888;
      }

      .carrito-vacio h3 {
        font-size: 1.25rem;
        font-weight: 700;
        margin: 0;
        color: white;
      }

      .carrito-vacio p {
        color: #7a9bb5;
        margin: 0;
        font-size: 0.95rem;
      }

      .btn-explorar {
        margin-top: 6px;
        background: white;
        color: black;
        border: 1px solid white;
        padding: 14px 40px;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
        transition: opacity 0.2s;
      }

      .btn-explorar:hover {
        opacity: 0.85;
      }

      /* === LISTA DE ITEMS === */
      .carrito-lista {
        padding: 16px 20px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .item-carrito {
        display: flex;
        gap: 14px;
        background: var(--card-bg);
        border-radius: 14px;
        overflow: hidden;
        padding: 12px;
        align-items: center;
      }

      .item-imagen {
        width: 72px;
        height: 90px;
        border-radius: 8px;
        object-fit: cover;
        flex-shrink: 0;
        background: #111;
      }

      .item-info {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .item-nombre {
        font-size: 0.95rem;
        font-weight: 600;
        margin: 0;
        line-height: 1.3;
      }

      .item-talla {
        font-size: 0.8rem;
        color: var(--text-dim);
        margin: 0;
      }

      .item-precio {
        font-size: 1rem;
        font-weight: 700;
        margin: 0;
      }

      .item-controles {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 6px;
      }

      .ctrl-btn {
        background: #2a2a2a;
        border: none;
        color: white;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 1.1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s;
      }

      .ctrl-btn:hover {
        background: #3a3a3a;
      }

      .item-cantidad {
        font-size: 0.95rem;
        font-weight: 600;
        min-width: 20px;
        text-align: center;
      }

      .btn-eliminar {
        background: none;
        border: none;
        color: #555;
        cursor: pointer;
        padding: 4px;
        display: flex;
        align-items: center;
        transition: color 0.2s;
        flex-shrink: 0;
      }

      .btn-eliminar:hover {
        color: #ff4444;
      }

      /* === RESUMEN === */
      .resumen {
        margin: 8px 20px 0;
        background: var(--card-bg);
        border-radius: 14px;
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .resumen-fila {
        display: flex;
        justify-content: space-between;
        font-size: 0.9rem;
        color: var(--text-dim);
      }

      .resumen-fila.total {
        border-top: 1px solid #2a2a2a;
        padding-top: 12px;
        margin-top: 4px;
        font-size: 1.1rem;
        font-weight: 700;
        color: white;
      }

      /* === BOTÓN PAGAR === */
      .footer-carrito {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--bg-dark);
        padding: 16px 20px;
        border-top: 1px solid #1a1a1a;
      }

      .btn-pagar {
        width: 100%;
        background: white;
        color: black;
        border: none;
        padding: 16px;
        border-radius: 14px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: opacity 0.2s;
      }

      .btn-pagar:hover {
        opacity: 0.85;
      }

      /* Toast */
      .toast {
        position: fixed;
        bottom: 90px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: #1a1a1a;
        border: 1px solid #333;
        color: white;
        padding: 12px 24px;
        border-radius: 30px;
        font-size: 0.9rem;
        opacity: 0;
        transition: all 0.3s;
        z-index: 100;
        white-space: nowrap;
      }

      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    </style>
  </head>
  <body>
    <div class="carrito-header">
      <a href="javascript:history.back()">
        <span class="material-icons-outlined">arrow_back</span>
      </a>
      <h2>Mi Carrito</h2>
    </div>

    <div id="contenido-carrito"></div>

    <div class="toast" id="toast"></div>

    <nav class="bottom-nav">
      <a href="index.html" class="nav-item">
        <span class="material-icons-outlined">home</span>
        <span>Inicio</span>
      </a>
      <a href="carrito.html" class="nav-item active">
        <span class="material-icons-outlined">shopping_cart</span>
        <span>Carrito</span>
      </a>
      <a href="perfil.html" class="nav-item">
        <span class="material-icons-outlined">person_outline</span>
        <span>Perfil</span>
      </a>
    </nav>

    <script type="module">
      import { supabase } from "./supabaseClient.js";

      function mostrarToast(msg) {
        const toast = document.getElementById("toast");
        toast.textContent = msg;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2500);
      }

      function obtenerCarrito() {
        return JSON.parse(localStorage.getItem("carrito") || "[]");
      }

      function guardarCarrito(carrito) {
        localStorage.setItem("carrito", JSON.stringify(carrito));
      }

      function calcularTotal(carrito) {
        return carrito.reduce((sum, i) => sum + i.precio * i.cantidad, 0);
      }

      function renderizarCarrito() {
        const carrito = obtenerCarrito();
        const contenedor = document.getElementById("contenido-carrito");

        // Limpiar footer previo
        const footerPrevio = document.querySelector(".footer-carrito");
        if (footerPrevio) footerPrevio.remove();

        if (carrito.length === 0) {
          contenedor.innerHTML = `
            <div class="carrito-vacio">
              <div class="icono-circulo">
                <span class="material-icons-outlined">shopping_bag</span>
              </div>
              <h3>Tu carrito está vacío</h3>
              <p>Agrega productos para comenzar tu compra</p>
              <a href="index.html" class="btn-explorar">Explorar Productos</a>
            </div>`;
          return;
        }

        const subtotal = calcularTotal(carrito);
        const envio = 0; // Gratis por ahora
        const total = subtotal + envio;

        const itemsHTML = carrito
          .map(
            (item) => `
          <div class="item-carrito" data-key="${item.key}">
            <img class="item-imagen" src="${item.imagen_url}" alt="${item.nombre}" />
            <div class="item-info">
              <p class="item-nombre">${item.nombre}</p>
              <p class="item-talla">Talla: ${item.talla}</p>
              <p class="item-precio">$${(item.precio * item.cantidad).toLocaleString("es-MX")} MXN</p>
              <div class="item-controles">
                <button class="ctrl-btn" data-action="restar" data-key="${item.key}">−</button>
                <span class="item-cantidad">${item.cantidad}</span>
                <button class="ctrl-btn" data-action="sumar" data-key="${item.key}">+</button>
              </div>
            </div>
            <button class="btn-eliminar" data-action="eliminar" data-key="${item.key}">
              <span class="material-icons-outlined">delete_outline</span>
            </button>
          </div>`,
          )
          .join("");

        contenedor.innerHTML = `
          <div class="carrito-lista">${itemsHTML}</div>
          <div class="resumen">
            <div class="resumen-fila">
              <span>Subtotal</span>
              <span>$${subtotal.toLocaleString("es-MX")} MXN</span>
            </div>
            <div class="resumen-fila">
              <span>Envío</span>
              <span>Gratis</span>
            </div>
            <div class="resumen-fila total">
              <span>Total</span>
              <span>$${total.toLocaleString("es-MX")} MXN</span>
            </div>
          </div>
          <div style="height: 90px;"></div>
        `;

        // Footer con botón pagar
        const footer = document.createElement("div");
        footer.className = "footer-carrito";
        footer.innerHTML = `
          <button class="btn-pagar" id="btn-pagar">
            <span class="material-icons-outlined">payment</span>
            Proceder al pago · $${total.toLocaleString("es-MX")} MXN
          </button>`;
        document.body.appendChild(footer);

        // Eventos de controles
        document.querySelectorAll("[data-action]").forEach((btn) => {
          btn.addEventListener("click", () => {
            const key = btn.dataset.key;
            const action = btn.dataset.action;
            let carrito = obtenerCarrito();

            if (action === "sumar") {
              const item = carrito.find((i) => i.key === key);
              if (item) item.cantidad += 1;
            } else if (action === "restar") {
              const item = carrito.find((i) => i.key === key);
              if (item) {
                item.cantidad -= 1;
                if (item.cantidad <= 0) {
                  carrito = carrito.filter((i) => i.key !== key);
                  mostrarToast("Producto eliminado");
                }
              }
            } else if (action === "eliminar") {
              carrito = carrito.filter((i) => i.key !== key);
              mostrarToast("Producto eliminado");
            }

            guardarCarrito(carrito);
            renderizarCarrito();
          });
        });

        // Botón pagar → va a checkout
        document
          .getElementById("btn-pagar")
          .addEventListener("click", async () => {
            const {
              data: { user },
            } = await supabase.auth.getUser();
            if (!user) {
              mostrarToast("⚠️ Inicia sesión para continuar");
              setTimeout(() => {
                window.location.href = "perfil.html";
              }, 1500);
              return;
            }
            window.location.href = "checkout.html";
          });
      }

      renderizarCarrito();
    </script>
  </body>
</html>
